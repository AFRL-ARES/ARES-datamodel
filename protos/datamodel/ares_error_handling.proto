syntax = "proto3";

package ares.datamodel;

import "command_status_code.proto";

enum ErrorHandling {
  UNKNOWN_HANDLING = 0;
  PROMPT_USER = 1;
  REPLAN = 2;
  RETRY_COMMAND = 3;
  RETRY_EXPERIMENT = 4;
  STOP_AND_CLOSEOUT = 5;
  ENTER_SAFE_MODE = 6;
}

message DeviceErrorHandlingConfig {
  CommandStatusCode code = 1;
  ErrorHandling handling = 2;
}