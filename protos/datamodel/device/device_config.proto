syntax = "proto3";

package ares.datamodel.device;

import "ares_struct.proto";
import "device/plugin/plugin_connection_info.proto";

message DeviceConfig {
  optional string unique_id = 1;
  string device_name = 2;
  string device_id = 3;
  string driver_id = 4;
  bool is_simulated = 5;
  optional device.plugin.SerialConnection serial_info = 13;
  AresStruct device_settings = 20;
}