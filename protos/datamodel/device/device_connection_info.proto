syntax = "proto3";

package ares.datamodel.device;

import "ares_struct.proto";

message DeviceConnectionInfo {
  string device_name = 1;
  string device_id = 2;
  bool simulated = 3;
  optional SerialConnection serial_connection_info = 4;
  AresStruct device_settings = 5;
}

message SerialConnection {
  string port_name = 1;   // e.g., "COM3", "/dev/ttyUSB0"
  optional string serial_id = 2;
  optional int32 baud_rate = 3;
}