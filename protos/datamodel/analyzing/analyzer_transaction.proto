syntax = "proto3";

package ares.datamodel.analyzing;

import "analyzing/analysis.proto";
import "analyzing/remote/ares_remote_analyzer_service.proto";
import "google/protobuf/timestamp.proto";

message AnalyzerTransaction {
  optional string unique_id = 1;
  string analyzer_name = 2;
  string analyzer_type = 3;
  string analyzer_version = 4;
  analyzing.remote.AnalysisRequest analysis_request = 5;
  Analysis analysis_response = 6;
  google.protobuf.Timestamp time_request_sent = 7;
  google.protobuf.Timestamp time_response_received = 8;
}